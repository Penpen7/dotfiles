# ステータスバーをトップに配置 (2行構成)
set-option -g status-position top
set -g status 2
# prefixキーをC-qに変更
set -g prefix C-q

# C-bのキーバインドを解除
unbind C-b

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# \ でペインを横分割する
bind \\ split-window -h -c '#{pane_current_path}'

# - でペインを\縦分割する
bind - split-window -v -c '#{pane_current_path}'

# 番号基準値を変更
set-option -g base-index 1

# マウス操作を有効にする
set-option -g mouse on

bind e setw synchronize-panes on
bind E setw synchronize-panes off

bind -n WheelUpPane   select-pane -t= \; copy-mode -e \; send-keys -M
bind -n WheelDownPane select-pane -t= \;                 send-keys -M

# コピーモードを設定する
## viのキーバインドを使用
setw -g mode-keys vi

set -g escape-time 0
set -g display-panes-time 10000
set -g pane-border-lines simple
set -g pane-active-border-style fg=colour111
set-option -g focus-events on
set-option -g default-terminal xterm-256color
set-option -g pane-border-status bottom
set-option -g pane-border-format "#[fg=black,bg=blue] #P #($HOME/dotfiles/config/powerline/tmux-pane-border #{pane_current_path})"
set -g pane-border-lines double

run-shell @TMUX_PLUGIN_YANK@
run-shell @TMUX_PLUGIN_OPEN@
run-shell @TMUX_PLUGIN_PAIN_CONTROL@
run-shell @TMUX_PLUGIN_RESURRECT@
run-shell @TMUX_PLUGIN_BATTERY@
run-shell @TMUX_PLUGIN_POWERLINE@
